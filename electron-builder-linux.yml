appId: com.pg-tracker.app
productName: PG-Tracker

publish:
  provider: github
  owner: Jensenyjc
  repo: PG-tracker

directories:
  buildResources: build
  output: dist-linux

files:
  - out/**/*
  - package.json

extraResources:
  - from: prisma
    to: prisma
  - from: node_modules/.prisma/client
    to: .prisma/client
  - from: node_modules/@prisma/engines
    to: node_modules/@prisma/engines

asar: true
asarUnpack:
  - "**/*.node"
  - "**/node_modules/.prisma/**"
  - "**/node_modules/@prisma/engines/**"

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Education
  icon: resources/icon.png
  artifactName: ${productName}-${version}-linux-${arch}.${ext}
