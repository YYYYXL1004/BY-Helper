appId: com.pg-tracker.app
productName: PG-Tracker

publish:
  provider: github
  owner: Jensenyjc
  repo: PG-tracker

directories:
  buildResources: build
  output: dist-mac

files:
  - out/**/*
  - package.json

extraResources:
  - from: prisma
    to: prisma
  - from: node_modules/.prisma/client
    to: .prisma/client
  - from: node_modules/@prisma/engines
    to: node_modules/@prisma/engines

asar: true
asarUnpack:
  - "**/*.node"
  - "**/node_modules/.prisma/**"
  - "**/node_modules/@prisma/engines/**"

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.education
  gatekeeperAssess: false
  hardenedRuntime: false
  identity: null
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
